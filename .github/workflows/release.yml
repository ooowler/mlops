name: Release
on:
  push:
    tags:
      - "v*.*.*"
jobs:
  docker-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Train tiny model for image
        env:
          PYTHONPATH: src
        run: |
          mkdir -p data/processed models
          python - <<'PY'
          import mlflow.sklearn
          import numpy as np
          import pandas as pd
          from pathlib import Path
          from sklearn.linear_model import LogisticRegression

          cols = ["Time"] + [f"V{i}" for i in range(1, 29)] + ["Amount", "Class"]
          rng = np.random.default_rng(0)
          n = 80
          rows = []
          for i in range(n):
              row = {"Time": float(i), "Class": int(rng.random() > 0.85)}
              for j in range(1, 29):
                  row[f"V{j}"] = float(rng.normal())
              row["Amount"] = float(rng.normal() + 10.0)
              rows.append(row)
          df = pd.DataFrame(rows, columns=cols)
          Path("data/processed").mkdir(parents=True, exist_ok=True)
          df.to_csv("data/processed/train.csv", index=False)
          df.to_csv("data/processed/test.csv", index=False)
          m = LogisticRegression(max_iter=500, random_state=42)
          m.fit(df.drop(columns=["Class"]), df["Class"])
          Path("models/logreg").mkdir(parents=True, exist_ok=True)
          mlflow.sklearn.save_model(m, "models/logreg")
          PY
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.serving
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-api:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-api:latest
      - name: Smoke test image
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/fraud-detection-api:${{ github.ref_name }}"
          docker pull "$IMAGE"
          CID=$(docker run -d -p 8000:8000 "$IMAGE")
          trap 'docker rm -f "$CID"' EXIT
          curl --retry 10 --retry-connrefused --retry-delay 2 --fail http://localhost:8000/health
          BODY=$(python3 -c "import json; print(json.dumps({'features': [0.0] * 30}))")
          curl --fail -X POST http://localhost:8000/predict -H "Content-Type: application/json" -d "$BODY"
