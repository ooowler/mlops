services:
  app:
    build: .
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      DATA_RAW: /app/data/raw
      DATA_PROCESSED: /app/data/processed
      MODEL_DIR: /app/models
      RANDOM_STATE: "42"
      TEST_SIZE: "0.2"
      FRAUD_CLASS: "1"
      TARGET_COLUMN: Class
      GIT_PYTHON_REFRESH: quiet
    command: ["python", "scripts/train.py", "--model", "rf"]

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./mlflow_data:/app/mlflow_data
    environment:
      MODEL_DIR: /app/models
      SERVE_MODEL: logreg
      MLFLOW_TRACKING_URI: file:///app/mlflow_data
    command: ["uvicorn", "fraud_detection.api:app", "--host", "0.0.0.0", "--port", "8000"]
    profiles:
      - api

  mlflow:
    image: python:3.11-slim
    working_dir: /app
    command: >
      sh -c "pip install mlflow -q &&
        mlflow server --host 0.0.0.0 --allowed-hosts '*' --backend-store-uri file:///app/mlflow_data --default-artifact-root /app/mlflow_data/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/app/mlflow_data
    profiles:
      - mlflow

  seed:
    build: .
    volumes:
      - ./data:/app/data
      - ./mlflow_data:/app/mlflow_data
    environment:
      DATA_PROCESSED: /app/data/processed
      MLFLOW_TRACKING_URI: file:///app/mlflow_data
      GIT_PYTHON_REFRESH: quiet
    command: ["python", "scripts/seed_mlflow_runs.py"]
    profiles:
      - mlflow
